<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍣 초밥 플래시카드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --red:#C8003A; --pink:#F2708A; --cream:#FDF6F0;
  --teal:#1B8A7A; --mint:#D4F0EB; --navy:#1A3557;
  --gold:#F0A500; --white:#FFFFFF; --dark:#2D1F1F;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--cream);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 15% 20%,rgba(242,112,138,.08) 0%,transparent 45%),
    radial-gradient(circle at 85% 80%,rgba(27,138,122,.08) 0%,transparent 45%);
}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:0 16px 48px;}

/* 헤더 */
header{text-align:center;padding:24px 0 18px;}
.emoji-row{font-size:26px;letter-spacing:5px;margin-bottom:6px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
header h1{font-size:24px;font-weight:900;color:var(--red);}
header p{font-size:12px;color:#aaa;margin-top:4px;}

/* 진행 */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.progress-wrap{flex:1;background:#EDD8CE;border-radius:20px;height:8px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--red),var(--pink));border-radius:20px;transition:width .4s ease;}
.progress-txt{font-size:12px;color:#aaa;font-weight:700;white-space:nowrap;}

/* 카드 컨테이너 */
.card-scene{perspective:1200px;margin-bottom:18px;}
.card-wrap{
  position:relative;width:100%;aspect-ratio:3/2.2;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.card-wrap.flipped{transform:rotateY(180deg);}

.card-face{
  position:absolute;inset:0;border-radius:24px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
  box-shadow:0 8px 32px rgba(45,31,31,.12);
}

/* 앞면 — 이미지 */
.card-front{
  background:var(--white);
}
.card-img{
  width:55%;max-height:55%;object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.1));
  margin-bottom:10px;
  transition:transform .3s;
}
.card-wrap:hover:not(.flipped) .card-img{transform:scale(1.05) rotate(-2deg);}
.card-kr{font-size:24px;font-weight:900;color:var(--dark);}
.card-hint{font-size:11px;color:#ccc;margin-top:6px;font-weight:700;letter-spacing:1px;}

/* 뒷면 — 일본어 */
.card-back{
  background:linear-gradient(145deg,var(--red) 0%,#E8004A 100%);
  transform:rotateY(180deg);
  gap:6px;
}
.card-back-pattern{
  position:absolute;inset:0;border-radius:24px;opacity:.08;
  background-image:repeating-linear-gradient(
    45deg,transparent,transparent 8px,
    rgba(255,255,255,.5) 8px,rgba(255,255,255,.5) 9px
  );
}
.card-jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:52px;font-weight:900;color:var(--white);
  line-height:1;position:relative;z-index:1;
}
.card-ro{font-size:18px;color:rgba(255,255,255,.75);font-weight:700;position:relative;z-index:1;}
.card-kr-back{font-size:14px;color:rgba(255,255,255,.55);margin-top:4px;position:relative;z-index:1;}

/* 음성 버튼 */
.speak-btn{
  position:absolute;bottom:14px;right:14px;z-index:2;
  width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(255,255,255,.25);color:var(--white);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(4px);
}
.speak-btn:hover{background:rgba(255,255,255,.4);transform:scale(1.1);}
.speak-btn.speaking{animation:speakPulse .6s ease-in-out infinite;}
@keyframes speakPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15);background:rgba(255,255,255,.5);}}

/* 컨트롤 */
.controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;}
.nav-btn{
  width:52px;height:52px;border-radius:50%;border:2.5px solid #EDD8CE;
  background:var(--white);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;box-shadow:0 2px 8px rgba(45,31,31,.07);
}
.nav-btn:hover{border-color:var(--pink);transform:scale(1.05);}
.nav-btn:disabled{opacity:.35;cursor:default;transform:none;}
.flip-btn{
  flex:1;max-width:180px;padding:14px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--red),var(--pink));
  color:var(--white);font-family:'Noto Sans KR',sans-serif;
  font-size:14px;font-weight:900;cursor:pointer;
  box-shadow:0 4px 14px rgba(200,0,58,.25);
  transition:all .2s;letter-spacing:.5px;
}
.flip-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(200,0,58,.35);}

/* 자동재생 */
.auto-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
.auto-btn{
  padding:9px 18px;border-radius:20px;border:2px solid #EDD8CE;
  background:var(--white);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;font-weight:700;color:#bbb;cursor:pointer;transition:all .2s;
}
.auto-btn.active{border-color:var(--teal);background:var(--mint);color:var(--teal);}
.auto-btn:hover:not(.active){border-color:var(--pink);color:var(--pink);}
.speed-select{
  padding:8px 12px;border-radius:20px;border:2px solid #EDD8CE;
  background:var(--white);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;font-weight:700;color:#aaa;cursor:pointer;outline:none;
}

/* 진행 도트 */
.dots{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:#EDD8CE;transition:all .3s;cursor:pointer;
}
.dot.current{background:var(--red);transform:scale(1.3);}
.dot.seen{background:var(--pink);}

/* 모드 탭 */
.mode-tabs{display:flex;gap:8px;margin-bottom:16px;}
.mode-tab{
  flex:1;padding:9px;border-radius:12px;
  border:2px solid #EDD8CE;background:var(--white);
  font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;
  color:#bbb;cursor:pointer;transition:all .2s;text-align:center;
}
.mode-tab.active{border-color:var(--red);background:#FFF0F3;color:var(--red);}

/* 셔플 버튼 */
.bottom-btns{display:flex;gap:8px;}
.shuffle-btn,.reset-btn-sm{
  flex:1;padding:11px;border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.shuffle-btn{border:2px solid var(--navy);background:transparent;color:var(--navy);}
.shuffle-btn:hover{background:var(--navy);color:var(--white);}
.reset-btn-sm{border:2px solid #EDD8CE;background:transparent;color:#bbb;}
.reset-btn-sm:hover{border-color:var(--red);color:var(--red);}

.hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="emoji-row">🍣 🍱 🍤</div>
    <h1>초밥 플래시카드</h1>
    <p>카드를 클릭해서 뒤집어보세요!</p>
  </header>

  <!-- 모드 탭 -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-jp" onclick="setMode('jp')">🇯🇵 일본어 (ひらがな)</button>
    <button class="mode-tab" id="tab-kr" onclick="setMode('kr')">🇰🇷 한글 발음</button>
  </div>

  <!-- 진행 -->
  <div class="progress-row">
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-txt" id="progress-txt">1 / 10</div>
  </div>

  <!-- 카드 -->
  <div class="card-scene">
    <div class="card-wrap" id="card-wrap" onclick="flipCard()">
      <!-- 앞면 -->
      <div class="card-face card-front">
        <img class="card-img" id="card-img" src="" alt="">
        <div class="card-kr" id="card-kr"></div>
        <div class="card-hint">👆 탭해서 뒤집기</div>
      </div>
      <!-- 뒷면 -->
      <div class="card-face card-back">
        <div class="card-back-pattern"></div>
        <div class="card-jp" id="card-jp"></div>
        <div class="card-ro" id="card-ro"></div>
        <div class="card-kr-back" id="card-kr-back"></div>
        <button class="speak-btn" id="speak-btn" onclick="event.stopPropagation();speak()">🔊</button>
      </div>
    </div>
  </div>

  <!-- 컨트롤 -->
  <div class="controls">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">◀</button>
    <button class="flip-btn" onclick="flipCard()">🔄 뒤집기</button>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">▶</button>
  </div>

  <!-- 자동재생 -->
  <div class="auto-row">
    <button class="auto-btn" id="auto-btn" onclick="toggleAuto()">▶ 자동재생</button>
    <select class="speed-select" id="speed-select">
      <option value="2000">보통 (2초)</option>
      <option value="3000">느림 (3초)</option>
      <option value="1500">빠름 (1.5초)</option>
    </select>
  </div>

  <!-- 진행 도트 -->
  <div class="dots" id="dots"></div>

  <!-- 하단 버튼 -->
  <div class="bottom-btns">
    <button class="shuffle-btn" onclick="shuffleCards()">🔀 섞기</button>
    <button class="reset-btn-sm" onclick="resetCards()">↩ 처음으로</button>
  </div>

</div>

<script>
// ── 데이터 ───────────────────────────────────────────────────────────────────
const SUSHI_ALL = [
  {kr:'참치',     jp:'まぐろ',   ro:'마구로',  img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjJBebp2jjzuxyNif2GEn6OIbgkfp55Jxl5LQPLBoGdltr8OCk2d6wiy2-pwsyB4BeqDUVEVewk1RHwLr9s0eciDIs68HkT2myDgPXae1l5_Wk-s4wsgG6kOAxiUatB-bRnpzo9g7foSJY/s400/sushi_akami.png'},
  {kr:'연어',     jp:'サーモン', ro:'사몬',    img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgKRKK3eYjQixOcNW2lWwuL3sOHnyFkuzbGVMOY0z6kINYHkACKw_-p-CVhXRxJIR6axoBkNN2qJfoB7x30KFXNj6W3sQyjudFiapFZRuoS_SEUHcJRUnterb5hQpF1g0A-UXBz3L5DFNE/s400/sushi_salmon.png'},
  {kr:'새우',     jp:'えび',     ro:'에비',    img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgXDOfU1cjZsqV2dnSO7JJ5FKMLOn8IngiZhbwKOlutpb6G1GNy8MKGs42DUgrsEf6eB2Ulrx5VMkFhAzeuW8kZc5h-d1RPaDLnrx4Nv80SNBIwOQcMUaSzbL5wPKwI4eZZmI4GxuZkBqc/s400/sushi_ebi.png'},
  {kr:'계란',     jp:'たまご',   ro:'타마고',  img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgZ1zd_lINPUset0fUwDwkLynI5MhuikoWzdso9NwSOEJAm-6QY68R1xBhLHNkoPR1DWlHuUDlgKUWsF3Ytwuit07pZwAN6H5eLaH7TV7WKFl_5Nupzoe4lak0sxy5XG22lw3VAPeg88Eo/s400/sushi_tamago.png'},
  {kr:'오징어',   jp:'いか',     ro:'이카',    img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg5Jjc6XGITcaxyECr576b6FgBRsOO1OIwQOr5z92XV61BWsP50lDOVrjiCvXNAX-Agr5OeWNIQzvjACXVGkP_u99T_EN4XCMum99GacSm-ma7Mwz8MoXOwnXJiSbhlBO5-i4zjQED7mXU/s400/sushi_ika.png'},
  {kr:'문어',     jp:'たこ',     ro:'타코',    img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhEOB3al6VA1FuVtRogAV3_C4-bNCidMCKJc7rHsSGTIc7ejDu9LqxbwoPjbdPjGJc90wWeHbZ4DpmY-bW6McsTBIOrofZ4GDYOp0wgk5U6ZXPYk5Tfv5_ltrjbPXJVD4UQgZ56DgmNbllS/s400/sushi_tako.png'},
  {kr:'성게알',   jp:'うに',     ro:'우니',    img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhpH_pkqxkNGA26TJk8BIUZhDscKa9kvsKf8rkRyYCotwp5D_XqtO-9q9aCn0_khvVnu1W0LAD3xjVB1kPegZjtL3WjseiuL_4uJcp_Dxtdf94c7ZYQf0flKotfNqPWoZJWGo4z-fKymuuf/s400/sushi_uni2.png'},
  {kr:'연어알',   jp:'いくら',   ro:'이쿠라',  img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhFLiFKr6ZiKugus9v6eArARidy877tSJMex8KV_DjiJ4frWeXRX5azJqtNOVJt-VXEzWgV2twZUll1e78NbqlTKH5sKzhQ201Xupy7gu2wz8yQ_Y2J2lECYJmFHTUMbAX1dYlxa6NFjPQ/s400/sushi_ikura.png'},
  {kr:'유부초밥', jp:'いなり',   ro:'이나리',  img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhAN27zX3P-hoqSiMN6YXoS4G6DVO6H6HHuZjEx_6w5c-yeB3T1ksrX9rPP1uE6OfStg3xLtS-VWQzq_YRh1D_4TL8GGbrrkJJ0oWFc8XtuQCCtNtfW7-v4ZrAbKiYkLqTAWOFmmlkIyDw/s400/inarizushi.png'},
  {kr:'장어',     jp:'うなぎ',   ro:'우나기',  img:'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjt8jmDDCOvNoKwtbVqyM3ltyDmHlQi7o6cU91B-GMkRfNWl_prB9rqyroHxSe-xta2wg-IAeOzH21BPNDOAb45w6_5dbtTnVvoeri-Gw7vK-wlMPhpSi_3KyKW5JqN55ESgkUCXbjltT-j/s300/sushi_unagi.png'},
];

// ── 상태 ─────────────────────────────────────────────────────────────────────
let deck = [...SUSHI_ALL];
let current = 0;
let isFlipped = false;
let mode = 'jp';       // 'jp' | 'kr'
let autoPlay = false;
let autoTimer = null;

const $ = id => document.getElementById(id);

// ── 모드 전환 ────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  $('tab-jp').classList.toggle('active', m === 'jp');
  $('tab-kr').classList.toggle('active', m === 'kr');
  renderCard();
}

// ── 카드 렌더 ────────────────────────────────────────────────────────────────
function renderCard(flip = false) {
  const s = deck[current];

  // 앞면
  $('card-img').src = s.img;
  $('card-img').alt = s.kr;
  $('card-kr').textContent = s.kr;

  // 뒷면
  $('card-jp').textContent = mode === 'jp' ? s.jp : s.ro;
  $('card-ro').textContent = mode === 'jp' ? s.ro : s.jp;
  $('card-kr-back').textContent = s.kr;

  // 카드 상태
  if (!flip) {
    isFlipped = false;
    $('card-wrap').classList.remove('flipped');
  }

  // 진행
  const pct = ((current + 1) / deck.length) * 100;
  $('progress-bar').style.width = pct + '%';
  $('progress-txt').textContent = `${current + 1} / ${deck.length}`;

  // 버튼
  $('prev-btn').disabled = current === 0;
  $('next-btn').disabled = current === deck.length - 1;

  // 도트
  renderDots();
}

// ── 뒤집기 ───────────────────────────────────────────────────────────────────
function flipCard() {
  isFlipped = !isFlipped;
  $('card-wrap').classList.toggle('flipped', isFlipped);

  // 뒤집히면 자동 발음
  if (isFlipped) {
    setTimeout(speak, 300);
  }
}

// ── 네비게이션 ───────────────────────────────────────────────────────────────
function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= deck.length) return;
  current = next;
  renderCard();
  markDot(current);
}

// ── 음성 (Web Speech API) ────────────────────────────────────────────────────
function speak() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const s = deck[current];
  const text = s.jp; // 항상 일본어 발음으로
  const utter = new SpeechSynthesisUtterance(text);

  // 일본어 음성 찾기
  const voices = window.speechSynthesis.getVoices();
  const jpVoice = voices.find(v => v.lang.startsWith('ja')) || null;
  if (jpVoice) utter.voice = jpVoice;
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  utter.pitch = 1;

  const btn = $('speak-btn');
  btn.classList.add('speaking');
  utter.onend = () => btn.classList.remove('speaking');
  utter.onerror = () => btn.classList.remove('speaking');

  window.speechSynthesis.speak(utter);
}

// 음성 목록 로드 (비동기)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ── 자동재생 ─────────────────────────────────────────────────────────────────
function toggleAuto() {
  autoPlay = !autoPlay;
  const btn = $('auto-btn');
  if (autoPlay) {
    btn.textContent = '⏸ 자동재생 중';
    btn.classList.add('active');
    runAuto();
  } else {
    btn.textContent = '▶ 자동재생';
    btn.classList.remove('active');
    clearTimeout(autoTimer);
  }
}

function runAuto() {
  if (!autoPlay) return;
  const delay = parseInt($('speed-select').value);

  if (!isFlipped) {
    // 앞면 → 뒤집기
    flipCard();
    autoTimer = setTimeout(runAuto, delay);
  } else {
    // 뒷면 → 다음 카드
    if (current < deck.length - 1) {
      autoTimer = setTimeout(() => {
        navigate(1);
        autoTimer = setTimeout(runAuto, 600);
      }, delay);
    } else {
      // 마지막 카드
      autoPlay = false;
      $('auto-btn').textContent = '▶ 자동재생';
      $('auto-btn').classList.remove('active');
    }
  }
}

// ── 도트 ─────────────────────────────────────────────────────────────────────
const seenSet = new Set();

function renderDots() {
  seenSet.add(current);
  const container = $('dots');
  container.innerHTML = '';
  deck.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' current' : seenSet.has(i) ? ' seen' : '');
    d.onclick = () => { current = i; renderCard(); };
    container.appendChild(d);
  });
}

function markDot(i) {
  seenSet.add(i);
  renderDots();
}

// ── 셔플 / 리셋 ──────────────────────────────────────────────────────────────
function shuffleCards() {
  clearTimeout(autoTimer);
  autoPlay = false;
  $('auto-btn').textContent = '▶ 자동재생';
  $('auto-btn').classList.remove('active');
  seenSet.clear();

  const a = [...deck];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  deck = a;
  current = 0;
  renderCard();
}

function resetCards() {
  clearTimeout(autoTimer);
  autoPlay = false;
  $('auto-btn').textContent = '▶ 자동재생';
  $('auto-btn').classList.remove('active');
  seenSet.clear();
  deck = [...SUSHI_ALL];
  current = 0;
  renderCard();
}

// ── 키보드 ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
  else if (e.key === 's' || e.key === 'S') speak();
});

// ── 시작 ─────────────────────────────────────────────────────────────────────
renderCard();
</script>
</body>
</html>
